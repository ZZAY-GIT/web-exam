services:
  db:
    image: postgres:15-alpine
    container_name: library_db
    restart: always
    environment:
      POSTGRES_DB: library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d library"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: library_web
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_pass@db:5432/library
      - FLASK_DEBUG=1
      - SECRET_KEY=super-secret-dev-key-12345
    ports:
      - "5012:5012"
    volumes:
      - ./app:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
